name: Daily Book Recommendation

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (北京时间早上 8:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击按钮触发，方便调试

jobs:
  fetch_and_generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 将新生成的文件推送到代码库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch & Generate Script
        env:
          # 从 GitHub Secrets 中读取 Gemini API 密钥
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python fetch_books.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 添加生成的 daliy-read.json 以及 history.json
          git add daliy-read.json history.json || true
          # 如果文件有变更则提交，没有变更则跳过
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update daily book reading [skip ci]"
          git push
