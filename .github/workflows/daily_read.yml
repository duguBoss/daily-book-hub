name: Daily Book Recommendation

on:
  schedule:
    # GitHub Actions runs in UTC. 21:00 UTC = 05:00 Beijing time (next day).
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual trigger in Actions UI

jobs:
  fetch_and_generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow

      - name: Run Fetch & Generate Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python fetch_books.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add images/ daliy-read.json history.json || true

          git diff --quiet && git diff --staged --quiet || git commit -m "feat: update daily book recommendation output [skip ci]"
          git push
