name: Daily Book Recommendation

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0 点运行
  workflow_dispatch:

jobs:
  fetch_and_generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开放写入权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch & Generate Script
        env:
          # 读取你在 Settings 里配置的 Gemini API 密钥
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 自动获取类似 octocat/my-repo 的仓库名称
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python fetch_books.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 提交新增的图片目录、每日 json 和去重 json
          git add images/ daliy-read.json history.json || true
          
          # 如果文件有变更则提交并推送到 main 分支
          git diff --quiet && git diff --staged --quiet || git commit -m "feat: update daily read content and images[skip ci]"
          git push
